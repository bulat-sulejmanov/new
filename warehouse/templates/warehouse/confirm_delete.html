{% extends 'warehouse/base.html' %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card">
      <div class="card-body text-center p-5">
        <i class="bi bi-exclamation-triangle display-1 text-warning mb-4"></i>
        <h3 class="mb-3">Удалить запись?</h3>
        <p class="text-muted mb-4">Это действие нельзя отменить</p>
        
        <form method="post" class="d-flex justify-content-center gap-3">
          {% csrf_token %}
          <a class="btn btn-zzz-secondary" href="javascript:history.back()">
            <i class="bi bi-x-lg me-2"></i>Отмена
          </a>
          <button class="btn btn-zzz-danger">
            <i class="bi bi-trash me-2"></i>Удалить
          </button>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
